services:
  materials-db:
    image: postgres:18-alpine
    container_name: materials-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_EXTERNAL_PORT}:${DB_INTERNAL_PORT}"
    volumes:
      - ./data_db:/var/lib/postgresql
    networks:
      - materials-network
networks:
  materials-network: